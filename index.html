<!DOCTYPE html>
<html>
<head>
<title>WiFi Scanner Pro V18</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:15px}
h2{text-align:center;text-shadow:0 0 10px #0f0}
.box{border:1px solid #0f0;padding:10px;margin-top:10px;border-radius:8px}
button,a.btn{background:#0f0;color:#000;border:none;padding:10px 12px;border-radius:5px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block;margin-top:5px}
#wifiList{margin-top:10px}
.wifi{border-bottom:1px dashed #0f0;padding:5px 0}
.signal{color:#ff0}
.note{color:#ff0;font-size:12px;margin-top:5px}
</style>
</head>
<body>
<h2>[ WIFI SCANNER PRO V18 ]</h2>

<div class="box">
  <button onclick="scanWifi()">[ START SCAN ]</button>
  <div id="wifiList"></div>
  <div class="note">*SIMULASI 100% FAKE. TIDAK BISA NGEHACK BENERAN</div>
</div>

<div class="box">
  <h3>[ ANONYMOUS CHAT ]</h3>
  <p>Chat sama Anonymous di WhatsApp 👇</p>
  <a class="btn" href="https://wa.me/628XXXXXXXXXX?text=Halo%20Anonymous" target="_blank">[ CHAT ANONYMOUS ]</a>
  <div class="note">*Ganti 628131336963 pake nomer WA lu. Format: 62 tanpa +</div>
  <div class="note">*Tips: Save nomer lu sendiri dengan nama kontak "Anonymous" di HP temen lu 😈</div>
</div>

<script>
const wifis = [
  "WiFi Tetangga | SIGNAL: 98% | LOCKED",
  "Indihome-5G | SIGNAL: 76% | LOCKED", 
  "Free_WiFi | SIGNAL: 45% | OPEN",
  "ADMIN_ONLY | SIGNAL: 100% | LOCKED",
  "POCO_X6 | SIGNAL: 88% | OPEN"
];

function scanWifi(){
  document.getElementById("wifiList").innerHTML = "SCANNING...";
  setTimeout(()=>{
    let html = "";
    wifis.sort(()=>0.5-Math.random()).forEach(w=>{
      html += `<div class="wifi">${w} <span class="signal">[TAP TO HACK]</span></div>`;
    });
    document.getElementById("wifiList").innerHTML = html;
  },2000);
}
</script>
</body>
</html>
